<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AquaKeep — Каталог</title>
    <!-- Tailwind via CDN for simplicity -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <h1 class="text-2xl font-bold">AquaKeep</h1>
            <div class="hidden sm:flex items-center space-x-4">
                <button id="open-cart" class="bg-blue-600 text-white px-4 py-2 rounded">Корзина (<span
                        id="cart-count">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Catalog -->
        <section class="lg:col-span-3">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Каталог баков</h2>
                <div class="space-x-2">
                    <label class="text-sm text-gray-600">Калькулятор подбора:</label>
                    <input id="need-liters" type="number" min="0" placeholder="Литры"
                        class="border rounded px-2 py-1 w-32" />
                    <button id="calc-btn" class="bg-green-500 text-white px-3 py-1 rounded text-sm">Подобрать</button>
                    <span id="calc-result" class="ml-3 text-sm text-gray-700"></span>
                </div>
            </div>

            <div id="products" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Products will be injected here -->
            </div>
        </section>

        <!-- Sidebar / Order form -->
        <aside class="lg:col-span-1 bg-white p-4 rounded shadow">
            <h3 class="text-lg font-medium mb-2">Оформить заказ</h3>
            <div class="mb-3 text-sm text-gray-600">Корзина (<span id="sidebar-count">0</span> товаров) — Сумма: <strong
                    id="sidebar-total">0</strong> ₽</div>

            <form id="order-form" class="space-y-3">
                <input id="name" name="name" placeholder="ФИО" required class="w-full border rounded px-3 py-2" />
                <input id="phone" name="phone" placeholder="Телефон" required class="w-full border rounded px-3 py-2" />
                <textarea id="comment" name="comment" placeholder="Комментарий (опционально)"
                    class="w-full border rounded px-3 py-2 text-sm"></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Отправить заказ</button>
            </form>

            <div class="mt-4 text-xs text-gray-500">UTM метки автоматически добавляются из URL.</div>
        </aside>
    </main>

    <!-- Cart modal / drawer -->
    <div id="cart-modal"
        class="fixed inset-0 bg-black bg-opacity-40 hidden items-end sm:items-center justify-center z-50">
        <div class="bg-white w-full sm:max-w-2xl rounded-t-lg sm:rounded-lg p-4">
            <div class="flex items-center justify-between mb-3">
                <h4 class="text-lg font-semibold">Ваша корзина</h4>
                <button id="close-cart" class="text-gray-600">Закрыть</button>
            </div>
            <div id="cart-items" class="space-y-3 max-h-80 overflow-auto"></div>
            <div class="mt-4 flex items-center justify-between">
                <div class="text-sm text-gray-700">Итого: <strong id="cart-total">0</strong> ₽</div>
                <button id="checkout" class="bg-green-600 text-white px-4 py-2 rounded">К оформлению</button>
            </div>
        </div>
    </div>

    <!-- Success modal -->
    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-11/12 sm:w-96 text-center">
            <h3 class="text-xl font-semibold mb-2">Заказ отправлен</h3>
            <p class="text-sm text-gray-700 mb-4">Спасибо! Мы свяжемся с вами в ближайшее время.</p>
            <button id="success-close" class="bg-blue-600 text-white px-4 py-2 rounded">Закрыть</button>
        </div>
    </div>

    <script>
        // Products data
        const PRODUCTS = [
            { id: 'p1', name: 'Бак 100 л', volume: 100, price: 4500, desc: 'Компактный бак 100 литров' },
            { id: 'p2', name: 'Бак 200 л', volume: 200, price: 8000, desc: 'Надёжный бак 200 литров' },
            { id: 'p3', name: 'Бак 300 л', volume: 300, price: 11500, desc: 'Экономичный бак 300 литров' },
            { id: 'p4', name: 'Бак 400 л', volume: 400, price: 15000, desc: 'Прочный бак 400 литров' },
            { id: 'p5', name: 'Бак 500 л', volume: 500, price: 18500, desc: 'Профессиональный бак 500 литров' }
        ];

        const STORAGE_KEY = 'aquakeep_cart_v1';

        // Utils
        function formatPrice(n) { return n.toLocaleString('ru-RU'); }

        function loadCart() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; }
        }
        function saveCart(cart) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cart)); }

        // Render products
        const productsEl = document.getElementById('products');
        function renderProducts() {
            productsEl.innerHTML = PRODUCTS.map(p => `
                    <article class="bg-white p-4 rounded shadow flex flex-col">
                        <div class="h-40 bg-gray-100 rounded mb-3 flex items-center justify-center">
                            <div class="text-gray-400">${p.volume} L</div>
                        </div>
                        <h3 class="font-semibold">${p.name}</h3>
                        <p class="text-sm text-gray-600 flex-1">${p.desc}</p>
                        <div class="mt-3 flex items-center justify-between">
                            <div class="text-lg font-bold">${formatPrice(p.price)} ₽</div>
                            <button onclick="addToCart('${p.id}')" class="bg-blue-600 text-white px-3 py-1 rounded">В корзину</button>
                        </div>
                    </article>
                `).join('');
        }

        // Cart operations
        function getCartSummary(cart) {
            const total = cart.reduce((s, it) => s + (it.qty * it.price), 0);
            const count = cart.reduce((s, it) => s + it.qty, 0);
            return { total, count };
        }

        function renderCart() {
            const cart = loadCart();
            const itemsEl = document.getElementById('cart-items');
            const cartTotalEl = document.getElementById('cart-total');
            const cartCountEl = document.getElementById('cart-count');
            const sidebarCount = document.getElementById('sidebar-count');
            const sidebarTotal = document.getElementById('sidebar-total');

            if (!itemsEl) return;
            itemsEl.innerHTML = cart.map(it => {
                const p = PRODUCTS.find(x => x.id === it.id);
                return `
                        <div class="flex items-center justify-between border-b pb-2">
                            <div>
                                <div class="font-medium">${p.name}</div>
                                <div class="text-sm text-gray-600">${it.qty} × ${formatPrice(p.price)} ₽</div>
                            </div>
                            <div class="flex items-center space-x-2">
                                <button class="px-2 py-1 bg-gray-200 rounded" onclick="changeQty('${it.id}', -1)">−</button>
                                <div>${it.qty}</div>
                                <button class="px-2 py-1 bg-gray-200 rounded" onclick="changeQty('${it.id}', 1)">+</button>
                                <button class="ml-2 text-sm text-red-600" onclick="removeFromCart('${it.id}')">Удалить</button>
                            </div>
                        </div>
                    `;
            }).join('') || '<div class="text-sm text-gray-600">Корзина пуста</div>';

            const summary = getCartSummary(cart);
            cartTotalEl.textContent = formatPrice(summary.total);
            cartCountEl.textContent = summary.count;
            sidebarCount.textContent = summary.count;
            sidebarTotal.textContent = formatPrice(summary.total);
        }

        function addToCart(id) {
            const cart = loadCart();
            const prod = PRODUCTS.find(p => p.id === id);
            if (!prod) return;
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty += 1; else cart.push({ id, qty: 1, price: prod.price });
            saveCart(cart);
            renderCart();
            // show cart modal on mobile
            const cartModal = document.getElementById('cart-modal');
            if (window.innerWidth < 640) cartModal.classList.remove('hidden');
        }
        window.addToCart = addToCart; // expose if needed

        function changeQty(id, delta) {
            const cart = loadCart();
            const it = cart.find(i => i.id === id);
            if (!it) return;
            it.qty += delta;
            if (it.qty <= 0) {
                const idx = cart.indexOf(it); cart.splice(idx, 1);
            }
            saveCart(cart);
            renderCart();
        }

        function removeFromCart(id) {
            const cart = loadCart().filter(i => i.id !== id);
            saveCart(cart);
            renderCart();
        }

        // Calculator
        document.getElementById('calc-btn').addEventListener('click', () => {
            const need = parseInt(document.getElementById('need-liters').value || '0', 10);
            const res = PRODUCTS.find(p => p.volume >= need) || PRODUCTS[PRODUCTS.length - 1];
            const txt = need > 0 ? `Рекомендуем: ${res.name} (${res.volume} л)` : 'Введите объём в литрах';
            document.getElementById('calc-result').textContent = txt;
        });

        // Cart modal controls
        document.getElementById('open-cart').addEventListener('click', () => document.getElementById('cart-modal').classList.remove('hidden'));
        document.getElementById('close-cart').addEventListener('click', () => document.getElementById('cart-modal').classList.add('hidden'));
        document.getElementById('checkout').addEventListener('click', () => { document.getElementById('cart-modal').classList.add('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' }); });

        // Parse UTM params
        function getUtm() {
            const params = new URLSearchParams(window.location.search);
            return {
                utm_source: params.get('utm_source') || null,
                utm_medium: params.get('utm_medium') || null,
                utm_campaign: params.get('utm_campaign') || null
            };
        }

        // Order submit
        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const cart = loadCart();
            if (!cart.length) { alert('Корзина пуста'); return; }
            if (!name || !phone) { alert('Заполните ФИО и телефон'); return; }

            const items = cart.map(i => ({ id: i.id, qty: i.qty, price: i.price }));
            const total = getCartSummary(cart).total;
            const payload = {
                name, phone, comment, items, total,
                ...getUtm()
            };

            try {
                const res = await fetch('/api/order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const json = await res.json();
                if (json && json.success) {
                    // show success
                    document.getElementById('success-modal').classList.remove('hidden');
                    // clear cart
                    localStorage.removeItem(STORAGE_KEY);
                    renderCart();
                    document.getElementById('order-form').reset();
                } else {
                    alert('Ошибка отправки заказа');
                }
            } catch (err) {
                console.error(err);
                alert('Не удалось отправить заказ');
            }
        });

        document.getElementById('success-close').addEventListener('click', () => document.getElementById('success-modal').classList.add('hidden'));

        // Initial render
        renderProducts();
        renderCart();
    </script>
</body>
