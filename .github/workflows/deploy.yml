name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          sudo apt-get update && sudo apt-get install -y rsync openssh-client
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Create directory on VPS
        run: |
          VPS_DIR="${DEPLOY_PATH:-/var/www/copilot/data/aquakeep}"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "mkdir -p '${VPS_DIR}'"

      - name: Rsync files to VPS (exclude .env)
        run: |
          VPS_DIR="${DEPLOY_PATH:-/var/www/copilot/data/aquakeep}"
          rsync -az --delete --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='.env' -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" ./ ${VPS_USER}@${VPS_HOST}:"${VPS_DIR}"

      - name: Copy .env from secrets to VPS
        run: |
          VPS_DIR="${DEPLOY_PATH:-/var/www/copilot/data/aquakeep}"
          if [ -n "${{ secrets.ENV_CONTENT }}" ]; then
            echo "${{ secrets.ENV_CONTENT }}" | ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "cat > '${VPS_DIR}/.env'"
          else
            echo "No ENV_CONTENT secret found. Please ensure .env is manually placed on VPS."
          fi

      - name: Deploy with docker compose
        run: |
          VPS_DIR="${DEPLOY_PATH:-/var/www/copilot/data/aquakeep}"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "cd '${VPS_DIR}' && docker-compose pull && docker-compose up -d --build"